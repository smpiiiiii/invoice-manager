<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 請求書管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0e1a">
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { font-family: 'Noto Sans JP', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center }
.container { text-align: center; padding: 40px 20px; max-width: 400px; width: 100% }
.logo { font-size: 64px; margin-bottom: 16px }
h1 { font-size: 24px; font-weight: 900; color: #38bdf8; margin-bottom: 8px }
.desc { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 32px }
.login-btn { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #333; padding: 14px 32px; border-radius: 12px; font-size: 15px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; font-family: inherit; box-shadow: 0 4px 14px rgba(0,0,0,.3); transition: transform .2s }
.login-btn:hover { transform: scale(1.02) }
.login-btn:active { transform: scale(.98) }
.login-btn img { width: 20px; height: 20px }
.features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 32px; text-align: left }
.feature { background: rgba(30,41,59,.6); border: 1px solid #334155; border-radius: 12px; padding: 14px }
.feature .icon { font-size: 20px; margin-bottom: 4px }
.feature .title { font-size: 12px; font-weight: 700; color: #e2e8f0 }
.feature .sub { font-size: 10px; color: #64748b; margin-top: 2px }
.error { background: #7f1d1d; color: #fca5a5; padding: 10px 16px; border-radius: 10px; font-size: 12px; margin-bottom: 16px }
</style>
</head>
<body>
<div class="container">
  <div class="logo">📋</div>
  <h1>請求書管理</h1>
  <p class="desc">Gmailの請求書を自動でAI解析。<br>Googleアカウントでログインするだけ。</p>

  <div id="errorMsg" class="error" style="display:none"></div>

  <a href="/api/auth/login" class="login-btn">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Googleでログイン
  </a>

  <div class="features">
    <div class="feature"><div class="icon">📧</div><div class="title">メール自動検出</div><div class="sub">PDF添付を自動抽出</div></div>
    <div class="feature"><div class="icon">🤖</div><div class="title">AI解析</div><div class="sub">Geminiが金額を読取</div></div>
    <div class="feature"><div class="icon">📁</div><div class="title">Drive保存</div><div class="sub">年月別に自動整理</div></div>
    <div class="feature"><div class="icon">📊</div><div class="title">一覧表</div><div class="sub">スプレッドシート自動</div></div>
  </div>
</div>

<script>
// エラーメッセージ表示
var params = new URLSearchParams(location.search);
var err = params.get('error');
if (err) {
  var msg = { auth_denied: '認証がキャンセルされました', token_failed: 'トークン取得に失敗しました', no_code: '認証コードが見つかりません', server_error: 'サーバーエラーが発生しました' };
  document.getElementById('errorMsg').textContent = '❌ ' + (msg[err] || 'エラー: ' + err);
  document.getElementById('errorMsg').style.display = 'block';
}
// ログイン済みならダッシュボードにリダイレクト
fetch('/api/me').then(function(r) { if (r.ok) location.href = '/dashboard'; });
</script>
</body>
</html>
