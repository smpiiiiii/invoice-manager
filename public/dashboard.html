<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📋 請求書・領収書管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { font-family: 'Noto Sans JP', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh }
.header { background: linear-gradient(135deg, #1e3a5f, #0d2137); padding: 16px; text-align: center; border-bottom: 1px solid rgba(56,189,248,.2) }
.header h1 { font-size: 17px; font-weight: 900; color: #38bdf8 }
.user-info { font-size: 11px; color: #64748b; margin-top: 4px }

/* モード切替（グローバル） */
.mode-toggle { display: flex; gap: 0; margin: 12px auto 0; max-width: 500px; padding: 0 12px }
.mode-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 900; cursor: pointer; border: 2px solid #334155; color: #64748b; transition: all .2s }
.mode-tab:first-child { border-radius: 10px 0 0 10px }
.mode-tab:last-child { border-radius: 0 10px 10px 0 }
.mode-tab.active-invoice { background: linear-gradient(135deg, #1e3a5f, #0d2137); border-color: #38bdf8; color: #38bdf8 }
.mode-tab.active-receipt { background: linear-gradient(135deg, #4a2c1e, #2d1a0e); border-color: #fbbf24; color: #fbbf24 }

.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; max-width: 500px; margin: 0 auto }
.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; text-align: center }
.stat-card .num { font-size: 24px; font-weight: 900; margin: 2px 0 }
.stat-card .label { font-size: 10px; color: #94a3b8 }
.invoice-theme .stat-card .num { color: #38bdf8 }
.invoice-theme .stat-card.gold .num { color: #fbbf24 }
.receipt-theme .stat-card .num { color: #fbbf24 }
.receipt-theme .stat-card.gold .num { color: #4ade80 }

.content { padding: 12px; max-width: 500px; margin: 0 auto }
.tabs { display: flex; gap: 4px; margin-bottom: 10px }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 700; border-radius: 10px; cursor: pointer; background: #0f172a; color: #64748b; border: 1px solid #1e293b }
.tab.active { background: #1e3a5f; color: #38bdf8; border-color: #38bdf8 }
.section { background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid #334155 }
.section h2 { font-size: 13px; font-weight: 900; color: #38bdf8; margin-bottom: 8px }
.receipt-theme .section h2 { color: #fbbf24 }
.btn { display: block; width: 100%; border: none; padding: 13px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; color: #fff; margin-bottom: 6px; text-align: center }
.btn:active { opacity: .8 }
.btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8) }
.btn-success { background: linear-gradient(135deg, #059669, #047857) }
.btn-warning { background: linear-gradient(135deg, #d97706, #b45309) }
.btn-outline { background: transparent; border: 2px solid #334155; color: #94a3b8 }
.btn:disabled { opacity: .4 }
.table-wrap { max-height: 280px; overflow: auto; border-radius: 8px; border: 1px solid #334155 }
table { width: 100%; border-collapse: collapse; font-size: 11px }
th { background: #0f172a; color: #38bdf8; padding: 7px 5px; text-align: left; position: sticky; top: 0; white-space: nowrap }
td { padding: 7px 5px; border-bottom: 1px solid #1e293b; white-space: nowrap }
.log-item { padding: 6px 8px; border-bottom: 1px solid #0f172a; font-size: 10px; line-height: 1.4 }
.hidden { display: none }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #334155; color: #e2e8f0; padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 700; z-index: 100; display: none }
.spinner { width: 28px; height: 28px; border: 3px solid #334155; border-top: 3px solid #38bdf8; border-radius: 50%; animation: spin .8s linear infinite; margin: 10px auto }
@keyframes spin { to { transform: rotate(360deg) } }
.stat-card { cursor: pointer; transition: transform .15s, box-shadow .15s }
.stat-card:active { transform: scale(.95) }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px }
.modal-overlay.show { display: flex }
.modal-box { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 16px; width: 100%; max-width: 460px; max-height: 70vh; overflow: auto }
.modal-box h3 { font-size: 14px; color: #38bdf8; margin-bottom: 10px }
.modal-close { float: right; background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer }
.modal-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #0f172a; font-size: 12px }
.batch-header { background: #0f172a; padding: 6px 8px; margin: 8px 0 4px; border-radius: 6px; font-size: 11px; color: #38bdf8; font-weight: 700 }
</style>
</head>
<body>
<div class="header">
  <h1>📋 請求書・領収書管理</h1>
  <div class="user-info" id="userInfo"></div>
</div>

<!-- モード切替 -->
<div class="mode-toggle">
  <div class="mode-tab active-invoice" data-mode="invoice">📄 請求書</div>
  <div class="mode-tab" data-mode="receipt">🧾 領収書</div>
</div>

<div class="stats invoice-theme" id="statsArea">
  <div class="stat-card" data-stat="processed"><div class="label">処理済み</div><div class="num" id="sProcessed">-</div></div>
  <div class="stat-card gold" data-stat="amount"><div class="label">合計金額</div><div class="num" id="sAmount">-</div></div>
  <div class="stat-card" data-stat="makers"><div class="label">取引先数</div><div class="num" id="sMakers">-</div></div>
  <div class="stat-card" data-stat="month"><div class="label">最新月</div><div class="num" id="sMonth" style="font-size:16px">-</div></div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="statModal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('statModal').classList.remove('show')">&times;</button>
    <div id="statModalContent"></div>
  </div>
</div>

<div class="content">
  <div class="tabs">
    <div class="tab active" data-tab="overview">📊 概要</div>
    <div class="tab" data-tab="table">📋 一覧</div>
    <div class="tab" data-tab="actions">⚡ 操作</div>
  </div>

  <div id="tab-overview">
    <div class="section">
      <h2>📈 月別推移</h2>
      <div id="chart" style="height:160px;display:flex;align-items:flex-end;gap:3px;padding-top:8px"></div>
      <div id="chartLabels" style="display:flex;gap:3px;margin-top:3px"></div>
    </div>
    <div class="section">
      <h2>🏆 トップ5</h2>
      <div id="topMakers"></div>
    </div>
  </div>

  <div id="tab-table" class="hidden">
    <div class="section">
      <h2 id="tableTitle">📋 メーカー × 月</h2>
      <div class="table-wrap" id="tableArea"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="tab-actions" class="hidden">
    <div class="section">
      <h2>⚡ 手動操作</h2>
      <button class="btn btn-primary" id="btnProcess">▶️ 今すぐ処理実行</button>
      <div style="font-size:10px;color:#64748b;margin:-2px 0 6px;text-align:center" id="modeHint">📄📧 メールを自動仕分け（請求書・領収書を自動判定）</div>
      <button class="btn btn-outline" id="btnSheet">📊 スプレッドシートを開く</button>
      <div id="debugArea" style="margin-top:8px;max-height:300px;overflow:auto;border-radius:8px"></div>
    </div>
    <div class="section">
      <h2>🔧 メンテナンス</h2>
      <button class="btn btn-warning" id="btnReset">🔄 処理済みラベルをリセット</button>
      <div style="font-size:10px;color:#64748b;margin:-2px 0 6px;text-align:center">同じメールを再処理したい場合に使用</div>
    </div>
    <div class="section">
      <h2>👤 アカウント</h2>
      <button class="btn btn-outline" onclick="document.cookie='inv_session=;Path=/;Max-Age=0';location.href='/api/auth/login'">🚪 ログアウト</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// タブ切替
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
    t.classList.add('active');
    ['overview','table','actions'].forEach(function(n) {
      document.getElementById('tab-' + n).classList.toggle('hidden', n !== t.getAttribute('data-tab'));
    });
  });
});

function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3000);
}

// グローバルデータ
var allData = null;
var currentMode = 'invoice';

// モード切替（グローバル）
document.querySelectorAll('.mode-tab').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.mode-tab').forEach(function(x) {
      x.classList.remove('active-invoice', 'active-receipt');
    });
    currentMode = b.getAttribute('data-mode');
    b.classList.add(currentMode === 'receipt' ? 'active-receipt' : 'active-invoice');

    // テーマ切替
    var statsArea = document.getElementById('statsArea');
    statsArea.classList.toggle('invoice-theme', currentMode === 'invoice');
    statsArea.classList.toggle('receipt-theme', currentMode === 'receipt');

    // ヒント切替
    var label = currentMode === 'receipt' ? '領収書' : '請求書';
    document.getElementById('modeHint').textContent = currentMode === 'receipt'
      ? '🧾 メール本文 + 添付ファイルから領収書を検出します'
      : '📄 PDF / PNG / JPG の請求書を自動検出します';
    document.getElementById('tableTitle').textContent = currentMode === 'receipt' ? '🧾 店舗 × 月' : '📋 メーカー × 月';

    // データ再描画
    if (allData) renderModeData(allData);
  });
});

function renderModeData(data) {
  var d = currentMode === 'receipt' ? data.receipt : data.invoice;
  if (!d) d = { totalProcessed: 0, totalAmount: 0, totalMakers: 0, latestMonth: '-', monthly: [], topMakers: [], tableData: [] };

  document.getElementById('sProcessed').textContent = d.totalProcessed || 0;
  document.getElementById('sAmount').textContent = '¥' + (d.totalAmount || 0).toLocaleString();
  document.getElementById('sMakers').textContent = d.totalMakers || 0;
  document.getElementById('sMonth').textContent = d.latestMonth || '-';
  renderChart(d.monthly || []);
  renderTop(d.topMakers || []);
  renderTable(d.tableData || []);
}

function loadData() {
  fetch('/api/data?t=' + Date.now()).then(function(r) {
    if (r.status === 401) { location.href = '/api/auth/login'; return; }
    return r.json();
  }).then(function(d) {
    if (!d) return;
    allData = d;
    if (d.user) document.getElementById('userInfo').textContent = d.user.name + ' (' + d.user.email + ')';
    renderModeData(d);
  }).catch(function() { showToast('データ取得失敗'); });
}

function renderChart(monthly) {
  var c = document.getElementById('chart'), l = document.getElementById('chartLabels');
  c.innerHTML = ''; l.innerHTML = '';
  if (!monthly.length) { c.innerHTML = '<div style="color:#64748b;font-size:11px;margin:auto">データなし</div>'; return; }
  var max = Math.max.apply(null, monthly.map(function(m) { return m.amount; })) || 1;
  var barColor = currentMode === 'receipt' ? 'linear-gradient(180deg,#fbbf24,#d97706)' : 'linear-gradient(180deg,#38bdf8,#0284c7)';
  monthly.forEach(function(m) {
    var h = Math.max((m.amount / max) * 140, 3);
    var bar = document.createElement('div');
    bar.style.cssText = 'flex:1;background:' + barColor + ';border-radius:4px 4px 0 0;height:' + h + 'px;min-width:16px';
    bar.title = m.month + ': ¥' + m.amount.toLocaleString();
    c.appendChild(bar);
    var lb = document.createElement('div');
    lb.style.cssText = 'flex:1;text-align:center;font-size:8px;color:#64748b;min-width:16px';
    lb.textContent = m.month.split('/')[1] + '月';
    l.appendChild(lb);
  });
}

function renderTop(makers) {
  var d = document.getElementById('topMakers'); d.innerHTML = '';
  if (!makers.length) { d.innerHTML = '<div style="color:#64748b;font-size:11px">データなし</div>'; return; }
  var icons = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  var amtColor = currentMode === 'receipt' ? '#4ade80' : '#fbbf24';
  makers.forEach(function(m, i) {
    var r = document.createElement('div');
    r.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #0f172a;font-size:12px';
    r.innerHTML = '<span style="width:22px;text-align:center">' + icons[i] + '</span><span style="flex:1;font-weight:700">' + m.name + '</span><span style="color:' + amtColor + ';font-weight:900">¥' + m.amount.toLocaleString() + '</span>';
    d.appendChild(r);
  });
}

function renderTable(data) {
  var w = document.getElementById('tableArea'); w.innerHTML = '';
  if (!data || data.length < 2) { w.innerHTML = '<div style="color:#64748b;font-size:11px;padding:16px;text-align:center">データなし</div>'; return; }
  var t = document.createElement('table');
  var thead = '<thead><tr>' + data[0].map(function(h) { return '<th>' + (h || '') + '</th>'; }).join('') + '</tr></thead>';
  var tbody = '<tbody>' + data.slice(1).map(function(row) {
    return '<tr>' + data[0].map(function(_, c) {
      var v = (row[c] !== undefined && row[c] !== null) ? row[c] : '';
      if (c > 0 && typeof v === 'number' && v > 0) return '<td style="color:#34d399;font-weight:700">¥' + v.toLocaleString() + '</td>';
      return '<td>' + v + '</td>';
    }).join('') + '</tr>';
  }).join('') + '</tbody>';
  t.innerHTML = thead + tbody;
  w.appendChild(t);
}

// 統計カードタップで詳細モーダル
document.querySelectorAll('.stat-card').forEach(function(card) {
  card.addEventListener('click', function() {
    var stat = card.getAttribute('data-stat');
    if (!allData) return;
    var d = currentMode === 'receipt' ? allData.receipt : allData.invoice;
    if (!d) return;
    var modal = document.getElementById('statModal');
    var content = document.getElementById('statModalContent');
    var modeIcon = currentMode === 'receipt' ? '🧾' : '📄';
    var modeLabel = currentMode === 'receipt' ? '領収書' : '請求書';
    var html = '';

    if (stat === 'processed') {
      html = '<h3>' + modeIcon + ' 処理済み詳細</h3>';
      if (d.tableData && d.tableData.length > 1) {
        var months = d.tableData[0].slice(1);
        for (var r = 1; r < d.tableData.length; r++) {
          var name = d.tableData[r][0] || '';
          for (var c = 1; c < d.tableData[r].length; c++) {
            var val = parseInt(d.tableData[r][c]) || 0;
            if (val > 0) {
              html += '<div class="modal-item"><span style="color:#e2e8f0">' + name + ' (' + (months[c-1]||'') + ')</span><span style="color:#4ade80;font-weight:700">¥' + val.toLocaleString() + '</span></div>';
            }
          }
        }
      } else { html += '<div style="color:#64748b">データなし</div>'; }
    } else if (stat === 'amount') {
      html = '<h3>' + modeIcon + ' 金額内訳</h3>';
      if (d.topMakers && d.topMakers.length > 0) {
        d.topMakers.forEach(function(m) {
          var pct = d.totalAmount > 0 ? Math.round(m.amount / d.totalAmount * 100) : 0;
          html += '<div class="modal-item"><span style="color:#e2e8f0">' + m.name + '</span><span style="color:#fbbf24;font-weight:700">¥' + m.amount.toLocaleString() + ' (' + pct + '%)</span></div>';
        });
        html += '<div class="modal-item" style="border-top:2px solid #334155;margin-top:6px;padding-top:8px"><span style="color:#94a3b8;font-weight:700">合計</span><span style="color:#4ade80;font-weight:900">¥' + (d.totalAmount||0).toLocaleString() + '</span></div>';
      } else { html += '<div style="color:#64748b">データなし</div>'; }
    } else if (stat === 'makers') {
      html = '<h3>' + modeIcon + ' 取引先一覧 (' + (d.totalMakers||0) + '社)</h3>';
      if (d.topMakers && d.topMakers.length > 0) {
        var allMakers = d.tableData ? d.tableData.slice(1).map(function(r) {
          var total = 0;
          for (var c = 1; c < r.length; c++) total += (parseInt(r[c]) || 0);
          return { name: r[0], amount: total };
        }).sort(function(a,b) { return b.amount - a.amount; }) : d.topMakers;
        allMakers.forEach(function(m, i) {
          html += '<div class="modal-item"><span style="color:#e2e8f0">' + (i+1) + '. ' + m.name + '</span><span style="color:#4ade80;font-weight:700">¥' + m.amount.toLocaleString() + '</span></div>';
        });
      } else { html += '<div style="color:#64748b">データなし</div>'; }
    } else if (stat === 'month') {
      html = '<h3>' + modeIcon + ' 月別合計</h3>';
      if (d.monthly && d.monthly.length > 0) {
        d.monthly.forEach(function(m) {
          html += '<div class="modal-item"><span style="color:#e2e8f0">' + m.month + '</span><span style="color:#38bdf8;font-weight:700">¥' + m.amount.toLocaleString() + '</span></div>';
        });
      } else { html += '<div style="color:#64748b">データなし</div>'; }
    }

    content.innerHTML = html;
    modal.classList.add('show');
  });
});

// 処理実行（統合仕分け・結果蓄積）
var batchOffset = 0;
var allBatchResults = []; // 結果蓄積用

function renderAllBatches(debugDiv) {
  var html = '';
  allBatchResults.forEach(function(batch) {
    html += '<div class="batch-header">📬 ' + batch.rangeStart + '〜' + batch.rangeEnd + '件目 (' + batch.processed + '/' + batch.found + '件成功) ｜ 残り約' + batch.remaining + '件</div>';
    batch.logs.forEach(function(l) {
      var statusColor = '#64748b';
      if (l.status && (l.status.includes('📄') || l.status.includes('🧾'))) statusColor = '#4ade80';
      if (l.status && l.status.includes('⚠️')) statusColor = '#f59e0b';
      if (l.status && l.status.includes('❌')) statusColor = '#f87171';
      var mailUrl = l.msgId ? 'https://mail.google.com/mail/u/0/#inbox/' + l.msgId : '';
      html += '<div class="log-item" style="border-left:3px solid ' + statusColor + ';padding-left:8px;margin-bottom:4px;cursor:' + (mailUrl ? 'pointer' : 'default') + '" ' + (mailUrl ? 'onclick="window.open(\'' + mailUrl + '\', \'_blank\')"' : '') + '>';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<div style="color:#e2e8f0;font-weight:600;font-size:11px;flex:1">' + (mailUrl ? '🔗 ' : '') + (l.subject || '不明') + '</div>';
      if (l.date) html += '<div style="color:#64748b;font-size:10px;white-space:nowrap;margin-left:8px">📅 ' + l.date + '</div>';
      html += '</div>';
      html += '<div style="color:' + statusColor + ';font-size:12px;font-weight:700">' + (l.status || '-') + '</div>';
      html += '</div>';
    });
  });
  debugDiv.innerHTML = html;
}

document.getElementById('btnProcess').addEventListener('click', function() {
  showToast('⏳ メール仕分け処理中...');
  this.disabled = true;
  var btn = this;
  var debugDiv = document.getElementById('debugArea');
  if (debugDiv) {
    var loadingHtml = '<div class="spinner"></div><div style="color:#94a3b8;text-align:center;font-size:12px;margin-top:8px">仕分け中... ' + (batchOffset + 1) + '件目〜</div>';
    debugDiv.innerHTML = loadingHtml;
  }
  fetch('/api/process', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  }).then(function(r) { return r.json(); }).then(function(d) {
    var found = (d.debug && d.debug.found) || 0;
    var remaining = (d.debug && d.debug.totalRemaining) || 0;
    var rangeStart = batchOffset + 1;
    var rangeEnd = batchOffset + found;
    batchOffset += found;
    showToast('✅ ' + (d.message || '完了'));
    btn.disabled = false;
    loadData();
    if (d.debug && debugDiv) {
      allBatchResults.push({
        rangeStart: rangeStart,
        rangeEnd: rangeEnd,
        found: found,
        processed: d.processed || 0,
        remaining: Math.max(remaining - found, 0),
        logs: d.debug.logs || []
      });
      renderAllBatches(debugDiv);
    }
  }).catch(function(e) { showToast('❌ エラー: ' + e.message); btn.disabled = false; });
});

// スプレッドシートを開く
document.getElementById('btnSheet').addEventListener('click', function() {
  if (!allData) { showToast('データ読み込み中'); return; }
  var d = currentMode === 'receipt' ? allData.receipt : allData.invoice;
  if (d && d.sheetUrl) window.open(d.sheetUrl, '_blank');
  else showToast('スプレッドシートがまだありません');
});

// ラベルリセット（統合）
document.getElementById('btnReset').addEventListener('click', function() {
  showToast('🔄 仕分けラベルリセット中...');
  this.disabled = true;
  var btn = this;
  fetch('/api/reset-labels', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  }).then(function(r) { return r.json(); }).then(function(d) {
    showToast('✅ ' + (d.message || '完了'));
    batchOffset = 0;
    allBatchResults = [];
    var debugDiv = document.getElementById('debugArea');
    if (debugDiv) debugDiv.innerHTML = '';
    btn.disabled = false;
    loadData();
  }).catch(function() { showToast('❌ エラー'); btn.disabled = false; });
});

loadData();
</script>
</body>
</html>
